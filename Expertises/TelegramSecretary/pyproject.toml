[project]
name = "telegramsecretary"
version = "0.1.0"
description = "Telegram Bot API の long-polling を Cloud Routine 上で常駐させ、認可済みチャットからのメッセージに Weave（SecretaryRole）が即応する対話チャネル"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    # Stage 7: ドキュメント系 mime (docx/pptx/xlsx) を markdown 化して Weave に渡す。
    # markitdown が内部で python-docx / python-pptx / openpyxl / mammoth /
    # magika (ML model) / onnxruntime 等の再帰依存を連れてくる点に留意。
    "markitdown[docx,pptx,xlsx]>=0.1.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["scripts/tests"]
pythonpath = ["scripts"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["scripts"]
omit = ["scripts/tests/*", "scripts/main.py"]
branch = true

[tool.coverage.report]
fail_under = 70
show_missing = true
