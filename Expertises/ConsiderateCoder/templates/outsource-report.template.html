<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #5a5a5a;
    --border: #d8d8d8;
    --accent: #2a5db0;
    --card-bg: #f6f7f9;
    --evidence-bg: #f0f4ea;
    --escalation-bg: #fdf1e6;
    --escalation-border: #d98c3c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --fg: #e8e8e8;
      --muted: #a0a0a0;
      --border: #3a3d42;
      --accent: #7aa7e8;
      --card-bg: #1d2024;
      --evidence-bg: #1c2419;
      --escalation-bg: #2a2118;
      --escalation-border: #b8763a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1rem;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.7;
  }
  main {
    max-width: 860px;
    margin: 0 auto;
  }
  header {
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 0.4rem;
  }
  .date {
    color: var(--muted);
    font-size: 0.9rem;
  }
  section {
    margin-bottom: 2rem;
  }
  h2 {
    font-size: 1.15rem;
    border-left: 4px solid var(--accent);
    padding-left: 0.6rem;
    margin-bottom: 0.8rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
  }
  th, td {
    text-align: left;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--border);
    font-size: 0.92rem;
    word-break: break-word;
  }
  pre {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    white-space: pre-wrap;
    font-size: 0.85rem;
  }
  .evidence {
    background: var(--evidence-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
  }
  .escalations {
    background: var(--escalation-bg);
    border: 1px solid var(--escalation-border);
    border-radius: 6px;
    padding: 1rem;
  }
  details {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 0.6rem;
  }
  summary {
    cursor: pointer;
    font-weight: 600;
  }
  details[open] summary {
    margin-bottom: 0.5rem;
  }
  footer {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 2rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }
  @media print {
    body { padding: 0; }
    details { border: none; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="date">{{DATE}}</div>
  </header>

  <section id="summary">
    <h2>サマリ</h2>
    <div>{{SUMMARY}}</div>
  </section>

  <section id="changes">
    <h2>変更ファイル</h2>
    <table>
      <thead>
        <tr><th>パス</th><th>種別</th><th>要約</th></tr>
      </thead>
      <tbody>
        {{CHANGES}}
      </tbody>
    </table>
  </section>

  <section id="evidence">
    <h2>物証</h2>
    <div class="evidence">
      <pre>{{EVIDENCE}}</pre>
    </div>
  </section>

  <section id="escalations">
    <h2>上申事項</h2>
    <div class="escalations">
      {{ESCALATIONS}}
    </div>
  </section>

  <section id="quiz">
    <h2>理解度クイズ</h2>
    <!--
      クイズ1問分のマークアップ例（{{QUIZ_ITEMS}} には 3-5 問分をこの形式で連結して埋める）:
      <details>
        <summary>Q: この変更が既存の挙動に影響する範囲はどこか？</summary>
        <p><strong>A:</strong> 回答本文。変更意図・影響範囲・リスクの観点で説明する。</p>
      </details>
    -->
    {{QUIZ_ITEMS}}
  </section>

  <footer>
    <p>Generated by /outsource — ConsiderateCoder</p>
  </footer>
</main>
</body>
</html>
